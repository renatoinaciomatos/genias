<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênias Heiki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .pad-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90vw; max-width: 320px; margin: 20px auto; }
        .btn-game { height: 120px; border-radius: 20px; border: none; font-size: 20px; font-weight: bold; cursor: pointer; opacity: 0.3; transition: 0.1s; }
        .btn-game:active, .ativo { opacity: 1 !important; transform: scale(0.96); box-shadow: 0 0 25px currentColor; }
        #v-verde { background: #00ff00; color: #00ff00; } #v-vermelho { background: #ff0000; color: #ff0000; }
        #v-amarelo { background: #ffff00; color: #ffff00; } #v-azul { background: #0000ff; color: #0000ff; }
        
        .memoria-controles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90vw; max-width: 320px; margin: 10px auto; }
        .btn-action { padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        .btn-play { background: #00ffca; color: black; }
        .btn-reset { background: #ffaa00; color: black; }
        .btn-enviar { background: white; color: black; padding: 14px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 90vw; max-width: 320px; margin-top: 15px; }
        
        #telaJogo { display: none; }
        video, canvas { width: 100%; max-width: 150px; display: block; margin: 10px auto; border-radius: 10px; }
        .input-text { padding: 10px; font-size: 16px; width: 80%; max-width: 260px; border-radius: 5px; border: 1px solid #555; background: #333; color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="telaRegistro">
        <h2>Entrar no Jogo</h2>
        <input type="text" id="nomeJogador" class="input-text" placeholder="Seu nome"><br><br>
        
        <label>Foto da Galeria ou Câmera:</label><br>
        <input type="file" id="fotoArquivo" accept="image/*" onchange="carregarDaGaleria(event)"><br><br>
        <video id="video" autoplay playsinline></video>
        <button onclick="tirarFoto()" style="padding: 5px 15px; margin-bottom: 15px;">Tirar Foto</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <br><br>
        <button onclick="entrarNaPartida()" style="padding: 12px 30px; font-size: 18px; background: #00ff00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Entrar</button>
    </div>

    <div id="telaJogo">
        <h2 id="statusPlayer">Aguardando início...</h2>
        
        <div class="pad-botoes">
            <button id="v-verde" class="btn-game" onclick="pressionar('verde')"></button>
            <button id="v-vermelho" class="btn-game" onclick="pressionar('vermelho')"></button>
            <button id="v-amarelo" class="btn-game" onclick="pressionar('amarelo')"></button>
            <button id="v-azul" class="btn-game" onclick="pressionar('azul')"></button>
        </div>

        <div class="memoria-controles">
            <button class="btn-action btn-play" id="btnPlay" onclick="reproduzirPadraoLocal()">▶️ Play</button>
            <button class="btn-action btn-reset" id="btnReset" onclick="limparPadraoLocal()">❌ Limpar</button>
        </div>

        <button id="btnEnviar" class="btn-enviar" onclick="enviarResposta()">Enviar Sequência</button>
    </div>

    <script>
        let meuId = String(Math.floor(Math.random() * 1000000000));
        let minhaFotoBase64 = "";
        let palpites = [];
        let euEstouVivo = true;
        let limpouProximaRodada = false;
        
        const SUPABASE_URL = "https://qnamlriacmkhjuotuqrh.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_nc5IreiRd5tteV5d-X6XJg_Uii68X0j"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const sonsGenius = {
            verde: 415,
            vermelho: 310,
            amarelo: 252,
            azul: 209
        };

        function tocarSom(cor) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = sonsGenius[cor] || 440;
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.2); // Som ligeiramente mais curto para o toque
                
                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + 0.2);
            } catch (e) {
                console.log("Áudio bloqueado:", e);
            }
        }

        const video = document.getElementById('video');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => video.srcObject = stream).catch(() => {});
        }

        function tirarFoto() {
            const canvas = document.getElementById('canvas');
            canvas.width = 120; canvas.height = 120;
            canvas.getContext('2d').drawImage(video, 0, 0, 120, 120);
            minhaFotoBase64 = canvas.toDataURL('image/jpeg');
            alert("Foto salva!");
        }

        function carregarDaGaleria(event) {
            const reader = new FileReader();
            reader.onload = function() { minhaFotoBase64 = reader.result; };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        async function entrarNaPartida() {
            const nome = document.getElementById('nomeJogador').value;
            if(!nome || !minhaFotoBase64) return alert("Nome e foto obrigatórios!");

            const { error } = await _supabase.from('jogadores').insert([
                { id: meuId, nome: nome, foto: minhaFotoBase64, vivo: true, resposta: "BLOQUEADO" }
            ]);
            if (error) return alert("Erro ao entrar: " + error.message);

            document.getElementById('telaRegistro').style.display = 'none';
            document.getElementById('telaJogo').style.display = 'block';
            
            setInterval(sincronizarEstadoComServidor, 600);
        }

        async function sincronizarEstadoComServidor() {
            try {
                const { data: eu } = await _supabase.from('jogadores').select('*').eq('id', meuId).single();
                if (!eu) return;

                euEstouVivo = eu.vivo;

                if (!euEstouVivo) {
                    document.getElementById('statusPlayer').innerText = "💀 VOCÊ FOI ELIMINADO!";
                    bloquearBotoes(true);
                    return;
                }
                
                if (eu.resposta === null) {
                    if (!limpouProximaRodada) {
                        limparPadraoLocal();
                        limpouProximaRodada = true; 
                    }
                    document.getElementById('statusPlayer').innerText = "Sua vez! Digite a sequência:";
                    bloquearBotoes(false); 
                } 
                else if (eu.resposta === "PISCANDO") {
                    limpouProximaRodada = false;
                    document.getElementById('statusPlayer').innerText = "Preste atenção no Painel...";
                    bloquearBotoes(true);
                } 
                else if (eu.resposta === "BLOQUEADO") {
                    limpouProximaRodada = false;
                    document.getElementById('statusPlayer').innerText = "Aguardando próxima rodada...";
                    bloquearBotoes(true);
                } 
                else if (Array.isArray(eu.resposta)) {
                    document.getElementById('statusPlayer').innerText = "Enviado! Aguardando resultado...";
                    bloquearBotoes(true);
                }
            } catch (err) { console.error("Erro na sincronização:", err); }
        }

        function bloquearBotoes(status) {
            document.querySelectorAll('.btn-game, .btn-action, .btn-enviar').forEach(b => {
                b.disabled = status;
            });
        }

        function pressionar(cor) {
            if(!euEstouVivo) return;
            palpites.push(cor);
            piscarLocal(cor);
            document.getElementById('btnEnviar').innerText = `Enviar Sequência (${palpites.length})`;
        }

        function piscarLocal(cor) {
            const btn = document.getElementById(`v-${cor}`);
            if(btn) {
                tocarSom(cor);
                btn.classList.add('ativo');
                setTimeout(() => btn.classList.remove('ativo'), 150);
            }
        }

        function limparPadraoLocal() {
            palpites = [];
            document.getElementById('btnEnviar').innerText = "Enviar Sequência";
        }

        async function reproduzirPadraoLocal() {
            if(palpites.length === 0) return;
            for(let cor of palpites) {
                piscarLocal(cor);
                await new Promise(r => setTimeout(r, 350));
            }
        }

        async function enviarResposta() {
            if(palpites.length === 0) return alert("Crie uma sequência!");
            bloquearBotoes(true);
            document.getElementById('statusPlayer').innerText = "Enviando...";

            try {
                await _supabase.from('jogadores')
                    .update({ resposta: palpites })
                    .eq('id', meuId);
                
                document.getElementById('statusPlayer').innerText = "Enviado! Aguardando resultado...";
            } catch(err) {
                console.error(err);
                alert("Erro ao enviar.");
                bloquearBotoes(false);
            }
        }
    </script>
</body>
</html>
