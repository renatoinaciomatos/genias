<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gênias Heiki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        /* Layout Principal Lado a Lado */
        .conteudo-principal { display: flex; justify-content: center; align-items: flex-start; gap: 50px; max-width: 800px; margin: 20px auto; }
        
        /* Lado Esquerdo: Jogo e Controles */
        .lado-esquerdo { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .painel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 300px; margin-top: 10px; }
        .botao { width: 140px; height: 140px; border-radius: 15px; opacity: 0.4; transition: 0.1s; }
        .ativo { opacity: 1 !important; box-shadow: 0 0 30px currentColor; }
        #verde { background: #00ff00; color: #00ff00; }
        #vermelho { background: #ff0000; color: #ff0000; }
        #amarelo { background: #ffff00; color: #ffff00; }
        #azul { background: #0000ff; color: #0000ff; }
        
        /* Lado Direito: Coluna de Jogadores */
        .coluna-direita { width: 200px; background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; max-height: 500px; overflow-y: auto; }
        .coluna-direita h3 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .grid-rostos { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .avatar-container { position: relative; width: 80px; text-align: center; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 4px solid #00ff00; }
        .avatar-container p { margin: 5px 0 0 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .eliminado img { border-color: #ff0000; filter: grayscale(1); }
        .eliminado::after { content: "❌"; position: absolute; top: 15px; left: 25px; font-size: 30px; }
        
        .controles { margin: 10px; }
        .btn-ctrl { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        #btnIniciar { background: #00ff00; color: black; }
        #btnPausar { background: #ffff00; color: black; }
        #btnReiniciar { background: #ff0000; color: white; }
    </style>
</head>
<body>
    <h1>Genius Família - Painel Principal</h1>
    <h2 id="status">Aguardando jogadores...</h2>
    
    <div class="conteudo-principal">
        <!-- ÁREA DOS PADS COLORIDOS (ESQUERDA) -->
        <div class="lado-esquerdo">
            <div class="controles">
                <button id="btnIniciar" class="btn-ctrl" onclick="iniciarJogo()">Iniciar</button>
                <button id="btnPausar" class="btn-ctrl" onclick="pausarJogo()">Pausar</button>
                <button id="btnReiniciar" class="btn-ctrl" onclick="reiniciarJogo()">Reiniciar</button>
            </div>

            <div class="painel">
                <div id="verde" class="botao"></div>
                <div id="vermelho" class="botao"></div>
                <div id="amarelo" class="botao"></div>
                <div id="azul" class="botao"></div>
            </div>
        </div>

        <!-- COLUNA DOS JOGADORES (DIREITA) -->
        <div class="coluna-direita">
            <h3>Jogadores</h3>
            <div class="grid-rostos" id="listaJogadores"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://qnamlriacmkhjuotuqrh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_nc5IreiRd5tteV5d-X6XJg_Uii68X0j";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let sequencia = [];
        let jogadoresAtivos = [];
        let jogoPausado = false;
        let processandoValidacao = false;

        const frequencias = { verde: 440, vermelho: 415, amarelo: 392, azul: 329 };
        function tocarSom(cor) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.value = frequencias[cor];
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) { console.error(e); }
        }

        async function limparBanco() {
            try {
                await _supabase.from('jogadores').delete().neq('id', 0);
                await _supabase.from('partida').upsert({ id: 1, status_jogo: "lobby", sequencia_atual: [], jogadores_vivos: [], verificar_resposta: false });
            } catch(e) { console.error(e); }
        }
        limparBanco();

        // Canal em tempo real corrigido
        _supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'jogadores' }, () => {
            atualizarLobby();
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'partida' }, payload => {
            if(payload.new && payload.new.verificar_resposta && !jogoPausado && !processandoValidacao) {
                checarRespostaDoJogador(payload.new);
            }
        })
        .subscribe();

        async function atualizarLobby() {
            try {
                const { data } = await _supabase.from('jogadores').select('*');
                if(!data) return;
                jogadoresAtivos = data;
                
                const container = document.getElementById('listaJogadores');
                container.innerHTML = '';

                data.forEach(jog => {
                    const div = document.createElement('div');
                    div.className = `avatar-container ${!jog.vivo ? 'eliminado' : ''}`;
                    div.innerHTML = `<img src="${jog.foto}" class="avatar"><p>${jog.nome}</p>`;
                    container.appendChild(div);
                });

                const vivos = data.filter(j => j.vivo);
                if (vivos.length === 0 && sequencia.length > 0) {
                    document.getElementById('status').innerText = "💀 Fim de Jogo! Todos foram eliminados.";
                    await _supabase.from('partida').update({ status_jogo: "fim" }).eq('id', 1);
                } else if (sequencia.length > 0) {
                    document.getElementById('status').innerText = `Repitam a sequência! (${vivos.length} vivos)`;
                } else {
                    document.getElementById('status').innerText = `Aguardando jogadores... (${data.length} na sala)`;
                }
            } catch(e) { console.error(e); }
        }

        function piscarBotao(cor) {
            const btn = document.getElementById(cor);
            if(!btn) return;
            btn.classList.add('ativo');
            tocarSom(cor);
            setTimeout(() => btn.classList.remove('ativo'), 400);
        }

        async function iniciarJogo() {
            if(jogadoresAtivos.length === 0) return alert("Aguarde pelo menos 1 jogador entrar!");
            jogoPausado = false;
            processandoValidacao = false;
            document.getElementById('btnPausar').innerText = "Pausar";
            sequencia = [];
            await _supabase.from('jogadores').update({ vivo: true }).neq('id', 0);
            setTimeout(proximaRodada, 800);
        }

        async function pausarJogo() {
            jogoPausado = !jogoPausado;
            const status = jogoPausado ? "pausado" : "rodando";
            document.getElementById('btnPausar').innerText = jogoPausado ? "Retomar" : "Pausar";
            document.getElementById('status').innerText = jogoPausado ? "Jogo Pausado" : "Repitam a sequência!";
            await _supabase.from('partida').update({ status_jogo: status }).eq('id', 1);
        }

        async function reiniciarJogo() {
            if(confirm("Deseja zerar a partida e remover todos os jogadores?")) {
                await limparBanco();
                sequencia = [];
                atualizarLobby();
            }
        }

        async function proximaRodada() {
            if(jogoPausado) return;
            processandoValidacao = false;
            
            const cores = ['verde', 'vermelho', 'amarelo', 'azul'];
            sequencia.push(cores[Math.floor(Math.random() * 4)]);

            document.getElementById('status').innerText = "Atenção à sequência...";
            await new Promise(r => setTimeout(r, 1000));

            for (let cor of sequencia) {
                piscarBotao(cor);
                await new Promise(r => setTimeout(r, 700));
            }

            const vivos = jogadoresAtivos.filter(j => j.vivo);
            await _supabase.from('partida').update({ 
                sequencia_atual: sequencia, 
                verificar_resposta: false,
                status_jogo: "rodando",
                jogadores_vivos: vivos.map(v => v.id)
            }).eq('id', 1);
            document.getElementById('status').innerText = "Repitam a sequência nos celulares!";
        }

        async function checarRespostaDoJogador(partida) {
            processandoValidacao = true;
            
            try {
                const { data: jogador } = await _supabase.from('jogadores').select('*').eq('id', partida.ultimo_jogador_id).single();
                if(!jogador) {
                    processandoValidacao = false;
                    return;
                }

                // CORREÇÃO CRÍTICA: Força a conversão e limpeza dos arrays para garantir compatibilidade textual exata
                const arrResposta = Array.isArray(partida.resposta_jogador) ? partida.resposta_jogador : JSON.parse(partida.resposta_jogador || "[]");
                const arrSequencia = Array.isArray(sequencia) ? sequencia : [];
                
                const acertou = arrResposta.length === arrSequencia.length && arrResposta.every((val, i) => val === arrSequencia[i]);

                if (!acertou) {
                    await _supabase.from('jogadores').update({ vivo: false }).eq('id', jogador.id);
                    document.getElementById('status').innerText = `💥 ${jogador.nome} errou e foi ELIMINADO!`;
                } else {
                    document.getElementById('status').innerText = `✅ ${jogador.nome} acertou a sequência!`;
                }

                // Desativa o gatilho e calcula sobreviventes numa única requisição estável
                const { data: todos } = await _supabase.from('jogadores').select('*');
                const vivosRestantes = todos ? todos.filter(j => j.vivo) : [];

                await _supabase.from('partida').update({ 
                    verificar_resposta: false,
                    jogadores_vivos: vivosRestantes.map(v => v.id)
                }).eq('id', 1);

                if (vivosRestantes.length === 0) {
                    setTimeout(() => {
                        atualizarLobby();
                        processandoValidacao = false;
                    }, 1500);
                } else {
                    setTimeout(proximaRodada, 2000);
                }

            } catch (erroGeral) {
                console.error("Erro interno na validação:", erroGeral);
                // Destrava o fluxo em caso de qualquer exceção imprevista de rede
                await _supabase.from('partida').update({ verificar_resposta: false }).eq('id', 1);
                processandoValidacao = false;
            }
        }
    </script>
</body>
</html>
