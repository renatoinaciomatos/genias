<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gênias Heiki - Painel Principal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .conteudo-principal { display: flex; justify-content: center; align-items: flex-start; gap: 50px; max-width: 800px; margin: 20px auto; }
        .lado-esquerdo { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .painel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 300px; margin-top: 10px; }
        .botao { width: 140px; height: 140px; border-radius: 15px; opacity: 0.4; transition: 0.1s; }
        .ativo { opacity: 1 !important; box-shadow: 0 0 30px currentColor; }
        #verde { background: #00ff00; color: #00ff00; }
        #vermelho { background: #ff0000; color: #ff0000; }
        #amarelo { background: #ffff00; color: #ffff00; }
        #azul { background: #0000ff; color: #0000ff; }
        
        .coluna-direita { width: 220px; background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; max-height: 500px; overflow-y: auto; }
        .coluna-direita h3 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .grid-rostos { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .avatar-container { position: relative; width: 100px; text-align: center; transition: 0.3s; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 4px solid #ffaa00; }
        .avatar-container p { margin: 5px 0 2px 0; font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-player { font-size: 11px; margin: 0; color: #aaa; }
        
        .submetido img { border-color: #00ffca !important; box-shadow: 0 0 15px #00ffca; }
        .submetido .status-player { color: #00ffca; font-weight: bold; }
        
        .eliminado img { border-color: #ff0000 !important; filter: grayscale(1); }
        .eliminado::after { content: "❌"; position: absolute; top: 15px; left: 35px; font-size: 30px; z-index: 10; }
        .eliminado .status-player { color: #ff0000; }
        
        .controles { margin: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        .btn-ctrl { padding: 10px 15px; font-size: 15px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        #btnIniciar { background: #00ff00; color: black; }
        #btnPausar { background: #ffff00; color: black; }
        #btnReiniciar { background: #ff0000; color: white; }
    </style>
</head>
<body>
    <h1>Gênias Heiki - Painel Principal</h1>
    <h2 id="status">Aguardando jogadores...</h2>
    
    <div class="conteudo-principal">
        <div class="lado-esquerdo">
            <div class="controles">
                <button id="btnIniciar" class="btn-ctrl" onclick="iniciarJogo()">Iniciar</button>
                <button id="btnPausar" class="btn-ctrl" onclick="pausarJogo()">Pausar</button>
                <button id="btnReiniciar" class="btn-ctrl" onclick="reiniciarJogo()">Reiniciar</button>
            </div>

            <div class="painel">
                <div id="verde" class="botao"></div>
                <div id="vermelho" class="botao"></div>
                <div id="amarelo" class="botao"></div>
                <div id="azul" class="botao"></div>
            </div>
        </div>

        <div class="coluna-direita">
            <h3>Jogadores</h3>
            <div class="grid-rostos" id="listaJogadores"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://qnamlriacmkhjuotuqrh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_nc5IreiRd5tteV5d-X6XJg_Uii68X0j";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let sequencia = [];
        let jogadoresAtivos = [];
        let jogoPausado = false;
        let checandoRespostas = false;

        async function limparBanco() {
            try {
                await _supabase.from('jogadores').delete().neq('id', '0');
            } catch(e) { console.log(e); }
        }
        
        setInterval(buscarAtualizacoes, 800);

        async function buscarAtualizacoes() {
            if (jogoPausado || checandoRespostas) return;
            try {
                const { data } = await _supabase.from('jogadores').select('*');
                if (data) {
                    jogadoresAtivos = data;
                    renderizarInterface();
                    verificarFimDoTurno();
                }
            } catch(err) { console.error(err); }
        }

        function renderizarInterface() {
            const container = document.getElementById('listaJogadores');
            container.innerHTML = '';
            const vivos = jogadoresAtivos.filter(j => j.vivo);

            jogadoresAtivos.forEach(jog => {
                const div = document.createElement('div');
                // Considera enviado apenas se for uma lista/array válido de cores
                const temRespostaValida = jog.resposta && Array.isArray(jog.resposta);

                if (!jog.vivo) {
                    div.className = "avatar-container eliminado";
                    div.innerHTML = `<img src="${jog.foto}" class="avatar"><p>${jog.nome}</p><span class="status-player">Eliminado</span>`;
                } else if (temRespostaValida) {
                    div.className = "avatar-container submetido";
                    div.innerHTML = `<img src="${jog.foto}" class="avatar"><p>${jog.nome}</p><span class="status-player">Enviado!</span>`;
                } else {
                    div.className = "avatar-container";
                    div.innerHTML = `<img src="${jog.foto}" class="avatar"><p>${jog.nome}</p><span class="status-player">Aguardando...</span>`;
                }
                container.appendChild(div);
            });

            if (vivos.length === 0 && sequencia.length > 0) {
                document.getElementById('status').innerText = "💀 Fim de Jogo! Todos foram eliminados.";
            } else if (sequencia.length > 0) {
                document.getElementById('status').innerText = `Repitam a sequência! (${vivos.length} vivos)`;
            } else {
                document.getElementById('status').innerText = `Aguardando jogadores... (${jogadoresAtivos.length} na sala)`;
            }
        }

        function verificarFimDoTurno() {
            if (sequencia.length === 0) return;
            const vivos = jogadoresAtivos.filter(j => j.vivo);
            if (vivos.length === 0) return;

            // Só processa se todos responderam com uma lista de jogadas válida
            const todosResponderam = vivos.every(j => j.resposta && Array.isArray(j.resposta));
            if (todosResponderam) {
                corrigirRodadaAutomatica(vivos);
            }
        }

        async function corrigirRodadaAutomatica(vivos) {
            checandoRespostas = true;
            document.getElementById('status').innerText = "Visualizando respostas...";

            let nomesAcertaram = [];

            for (let jog of vivos) {
                const resp = jog.resposta || [];
                const acertou = resp.length === sequencia.length && resp.every((v, i) => v === sequencia[i]);

                if (!acertou) {
                    await _supabase.from('jogadores').update({ vivo: false, resposta: "BLOQUEADO" }).eq('id', jog.id);
                } else {
                    await _supabase.from('jogadores').update({ resposta: "BLOQUEADO" }).eq('id', jog.id);
                    nomesAcertaram.push(jog.nome);
                }
            }

            if (nomesAcertaram.length > 0) {
                document.getElementById('status').innerText = `🎉 Parabéns ${nomesAcertaram.join(', ')}! Preparando próximo turno...`;
            } else {
                document.getElementById('status').innerText = "Ninguém acertou! Fim da rodada.";
            }

            setTimeout(async () => {
                const { data: atualizados } = await _supabase.from('jogadores').select('*');
                jogadoresAtivos = atualizados || [];
                checandoRespostas = false;
                proximaRodada();
            }, 3000);
        }

        function piscarBotao(cor) {
            const btn = document.getElementById(cor);
            if(!btn) return;
            btn.classList.add('ativo');
            setTimeout(() => btn.classList.remove('ativo'), 400);
        }

        async function iniciarJogo() {
            if(jogadoresAtivos.length === 0) return alert("Aguarde os jogadores entrarem!");
            jogoPausado = false;
            checandoRespostas = false;
            sequencia = [];
            await _supabase.from('jogadores').update({ vivo: true, resposta: "BLOQUEADO" }).neq('id', '0');
            setTimeout(proximaRodada, 800);
        }

        function pausarJogo() {
            jogoPausado = !jogoPausado;
            document.getElementById('btnPausar').innerText = jogoPausado ? "Retomar" : "Pausar";
        }

        async function reiniciarJogo() {
            if(confirm("Zerar partida?")) {
                await limparBanco();
                sequencia = [];
                checandoRespostas = false;
                renderizarInterface();
            }
        }

        async function proximaRodada() {
            if(jogoPausado) return;
            
            const { data: vivos } = await _supabase.from('jogadores').select('*').eq('vivo', true);
            if (!vivos || vivos.length === 0) {
                document.getElementById('status').innerText = "💀 Fim de Jogo! Não restaram jogadores vivos.";
                return;
            }

            const cores = ['verde', 'vermelho', 'amarelo', 'azul'];
            sequencia.push(cores[Math.floor(Math.random() * 4)]);

            document.getElementById('status').innerText = "Atenção à sequência...";
            
            // Celular vê "PISCANDO" e bloqueia os botões enquanto as luzes brilham
            await _supabase.from('jogadores').update({ resposta: "PISCANDO" }).eq('vivo', true);
            
            await new Promise(r => setTimeout(r, 1200));

            for (let cor of sequencia) {
                piscarBotao(cor);
                await new Promise(r => setTimeout(r, 700));
            }

            // Celular vê NULL e é forçado a liberar instantaneamente!
            await _supabase.from('jogadores').update({ resposta: null }).eq('vivo', true);
            document.getElementById('status').innerText = "Repitam a sequência nos celulares!";
        }
    </script>
</body>
</html>
