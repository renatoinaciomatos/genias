<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Notebook - Painel Genius Multiplayer</title>
    <!-- CORREÇÃO: Biblioteca oficial e completa do Supabase v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        .painel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 300px; margin: 20px auto; }
        .botao { width: 140px; height: 140px; border-radius: 15px; opacity: 0.4; transition: 0.1s; cursor: pointer; }
        .ativo { opacity: 1 !important; box-shadow: 0 0 30px currentColor; }
        #verde { background: #00ff00; color: #00ff00; }
        #vermelho { background: #ff0000; color: #ff0000; }
        #amarelo { background: #ffff00; color: #ffff00; }
        #azul { background: #0000ff; color: #0000ff; }
        .grid-rostos { display: flex; justify-content: center; gap: 30px; margin-top: 40px; flex-wrap: wrap; }
        .avatar-container { position: relative; width: 100px; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #00ff00; }
        .eliminado img { border-color: #ff0000; filter: grayscale(1); }
        .eliminado::after { content: "❌"; position: absolute; top: 30px; left: 35px; font-size: 40px; }
        .controles { margin: 20px; }
        .btn-ctrl { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        #btnIniciar { background: #00ff00; color: black; }
        #btnPausar { background: #ffff00; color: black; }
        #btnReiniciar { background: #ff0000; color: white; }
    </style>
</head>
<body>
    <h1>Genius Família - Painel Principal</h1>
    <h2 id="status">Conectando ao banco...</h2>
    
    <div class="controles">
        <button id="btnIniciar" class="btn-ctrl" onclick="iniciarJogo()">Iniciar</button>
        <button id="btnPausar" class="btn-ctrl" onclick="pausarJogo()">Pausar</button>
        <button id="btnReiniciar" class="btn-ctrl" onclick="reiniciarJogo()">Reiniciar</button>
    </div>

    <div class="painel">
        <div id="verde" class="botao"></div>
        <div id="vermelho" class="botao"></div>
        <div id="amarelo" class="botao"></div>
        <div id="azul" class="botao"></div>
    </div>

    <div class="grid-rostos" id="listaJogadores"></div>

    <script>
        // CORREÇÃO: URL base sem o sufixo rest/v1/ e utilizando suas chaves atualizadas
        const SUPABASE_URL = "https://qnamlriacmkhjuotuqrh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_nc5IreiRd5tteV5d-X6XJg_Uii68X0j";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let sequencia = [];
        let jogadoresAtivos = [];
        let jogoPausado = false;

        // Sons integrados do navegador para o painel principal
        const frequencias = { verde: 440, vermelho: 415, amarelo: 392, azul: 329 };
        function tocarSom(cor) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = frequencias[cor];
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.stop(ctx.currentTime + 0.4);
        }

        async function limparBanco() {
            try {
                await _supabase.from('jogadores').delete().neq('id', 0);
                await _supabase.from('partida').upsert({ id: 1, status_jogo: "lobby", sequencia_atual: [], jogadores_vivos: [] });
                document.getElementById('status').innerText = "Aguardando jogadores...";
            } catch(e) { console.log(e); }
        }

        // Configura canais Realtime
        _supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'jogadores' }, () => {
            atualizarLobby();
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'partida' }, payload => {
            if(payload.new.verificar_resposta && !jogoPausado) checarRespostaDoJogador(payload.new);
        })
        .subscribe();

        async function atualizarLobby() {
            const { data } = await _supabase.from('jogadores').select('*');
            if(!data) return;
            jogadoresAtivos = data;
            
            const vivos = data.filter(j => j.vivo);
            document.getElementById('status').innerText = `Jogadores na sala: (${data.length}) - Vivos: (${vivos.length})`;
            
            const container = document.getElementById('listaJogadores');
            container.innerHTML = '';

            data.forEach(jog => {
                const div = document.createElement('div');
                div.className = `avatar-container ${!jog.vivo ? 'eliminado' : ''}`;
                div.innerHTML = `<img src="${jog.foto}" class="avatar"><p>${jog.nome}</p>`;
                container.appendChild(div);
            });

            if (vivos.length === 1 && sequencia.length > 0) {
                document.getElementById('status').innerText = `🏆 ${vivos[0].nome} Venceu o Jogo!`;
                await _supabase.from('partida').update({ status_jogo: "fim" }).eq('id', 1);
            }
        }

        function piscarBotao(cor) {
            const btn = document.getElementById(cor);
            btn.classList.add('ativo');
            tocarSom(cor);
            setTimeout(() => btn.classList.remove('ativo'), 400);
        }

        async function iniciarJogo() {
            if(jogadoresAtivos.length === 0) return alert("Aguarde pelo menos 1 jogador entrar!");
            jogoPausado = false;
            document.getElementById('btnPausar').innerText = "Pausar";
            sequencia = [];
            
            // Força todos a ficarem vivos ao iniciar uma nova partida completa
            await _supabase.from('jogadores').update({ vivo: true }).neq('id', 0);
            setTimeout(proximaRodada, 1000);
        }

        async function pausarJogo() {
            jogoPausado = !jogoPausado;
            const status = jogoPausado ? "pausado" : "rodando";
            document.getElementById('btnPausar').innerText = jogoPausado ? "Retomar" : "Pausar";
            document.getElementById('status').innerText = jogoPausado ? "Jogo Pausado" : "Repitam a sequência!";
            await _supabase.from('partida').update({ status_jogo: status }).eq('id', 1);
        }

        async function reiniciarJogo() {
            if(confirm("Deseja zerar a partida e remover todos os jogadores?")) {
                sequencia = [];
                await limparBanco();
                await atualizarLobby();
            }
        }

        async function proximaRodada() {
            if(jogoPausado) return;
            
            const { data: todos } = await _supabase.from('jogadores').select('*');
            const vivos = todos.filter(j => j.vivo);
            
            if(vivos.length === 0) {
                document.getElementById('status').innerText = "Ninguém restou! Reinicie a partida.";
                return;
            }

            const cores = ['verde', 'vermelho', 'amarelo', 'azul'];
            sequencia.push(cores[Math.floor(Math.random() * 4)]);

            document.getElementById('status').innerText = "Preste Atenção na Sequência...";
            await new Promise(r => setTimeout(r, 1000));

            for (let cor of sequencia) {
                piscarBotao(cor);
                await new Promise(r => setTimeout(r, 700));
            }

            await _supabase.from('partida').update({ 
                sequencia_atual: sequencia, 
                verificar_resposta: false,
                status_jogo: "rodando",
                jogadores_vivos: vivos.map(v => v.id)
            }).eq('id', 1);
            
            document.getElementById('status').innerText = "Repitam a sequência nos celulares!";
        }

        async function checarRespostaDoJogador(partida) {
            const { data: jogador } = await _supabase.from('jogadores').select('*').eq('id', partida.ultimo_jogador_id).single();
            if(!jogador) return;

            const acertou = JSON.stringify(partida.resposta_jogador) === JSON.stringify(sequencia);

            if (!acertou) {
                await _supabase.from('jogadores').update({ vivo: false }).eq('id', jogador.id);
                alert(`💥 ${jogador.nome} errou e foi ELIMINADO!`);
            } else {
                alert(`✅ ${jogador.nome} acertou a sequência!`);
            }

            const { data: todos } = await _supabase.from('jogadores').select('*');
            const vivosRestantes = todos.filter(j => j.vivo);

            if (vivosRestantes.length <= 1) {
                await atualizarLobby();
            } else {
                // Se ainda há mais pessoas para jogar na rodada atual antes de avançar, você gerencia aqui ou passa a vez
                // Para simplificar o fluxo de turnos diretos:
                proximaRodada();
            }
        }

        // Executa uma limpeza inicial suave
        limparBanco();
    </script>
</body>
</html>
