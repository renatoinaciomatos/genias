<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogador - Controle Genius</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .pad-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90vw; max-width: 320px; margin: 30px auto; }
        .btn-game { height: 130px; border-radius: 20px; border: none; font-size: 20px; font-weight: bold; }
        #v-verde { background: #00ff00; } #v-vermelho { background: #ff0000; }
        #v-amarelo { background: #ffff00; } #v-azul { background: #0000ff; }
        #telaJogo { display: none; }
        video, canvas { width: 100%; max-width: 200px; display: block; margin: 10px auto; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- TELA INICIAL: LOGIN E FOTO -->
    <div id="telaRegistro">
        <h2>Entrar no Jogo</h2>
        <input type="text" id="nomeJogador" placeholder="Seu nome" style="padding: 10px; font-size: 16px;"><br><br>
        
        <label>Escolher da Galeria:</label><br>
        <input type="file" id="fotoArquivo" accept="image/*" onchange="carregarDaGaleria(event)"><br><br>
        
        <label>Ou usar a Câmera:</label>
        <video id="video" autoplay playsinline></video>
        <button onclick="tirarFoto()">Capturar Foto da Câmera</button>
        <canvas id="canvas" style="display:none;"></canvas>
        
        <br><br><button onclick="entrarNaPartida()" style="padding: 12px 30px; font-size: 18px; background: #00ff00;">Entrar</button>
    </div>

    <!-- TELA DO JOGO: CONTROLE GENIUS -->
    <div id="telaJogo">
        <h2 id="statusPlayer">Aguardando início...</h2>
        <div class="pad-botoes">
            <button id="v-verde" class="btn-game" onclick="pressionar('verde')"></button>
            <button id="v-vermelho" class="btn-game" onclick="pressionar('vermelho')"></button>
            <button id="v-amarelo" class="btn-game" onclick="pressionar('amarelo')"></button>
            <button id="v-azul" class="btn-game" onclick="pressionar('azul')"></button>
        </div>
        <button onclick="enviarResposta()" style="background: white; color: black; padding: 10px 20px; font-size: 16px;">Enviar Sequência</button>
    </div>

    <script>
        const SUPABASE_URL = "SUA_URL_DO_SUPABASE";
        const SUPABASE_KEY = "SUA_ANON_KEY_DO_SUPABASE";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let meuId = Date.now();
        let minhaFotoBase64 = "";
        let palpites = [];

        // Inicializar Câmera
        const video = document.getElementById('video');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => video.srcObject = stream)
            .catch(err => console.log("Sem acesso à câmera, use a galeria"));

        function tirarFoto() {
            const canvas = document.getElementById('canvas');
            canvas.width = 150; canvas.height = 150;
            canvas.getContext('2d').drawImage(video, 0, 0, 150, 150);
            minhaFotoBase64 = canvas.toDataURL('image/jpeg');
            alert("Foto capturada com sucesso!");
        }

        function carregarDaGaleria(event) {
            const reader = new FileReader();
            reader.onload = function() { minhaFotoBase64 = reader.result; };
            reader.readAsDataURL(event.target.files[0]);
        }

        async function entrarNaPartida() {
            const nome = document.getElementById('nomeJogador').value;
            if(!nome || !minhaFotoBase64) return alert("Insira seu nome e foto!");

            await _supabase.from('jogadores').insert({
                id: meuId, nome: nome, foto: minhaFotoBase64, vivo: true
            });

            document.getElementById('telaRegistro').style.display = 'none';
            document.getElementById('telaJogo').style.display = 'block';

            ouvirPartida();
        }

        function ouvirPartida() {
            _supabase.channel('partida-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'partida' }, payload => {
                const dados = payload.new;
                if (dados.jogadores_vivos.includes(meuId)) {
                    document.getElementById('statusPlayer').innerText = "Sua vez! Digite a sequência:";
                    palpites = [];
                } else {
                    document.getElementById('statusPlayer').innerText = "Aguarde os outros jogarem...";
                }
            })
            .subscribe();

            _supabase.channel('meu-status').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'jogadores', filter: `id=eq.${meuId}` }, payload => {
                if(!payload.new.vivo) {
                    document.getElementById('statusPlayer').innerText = "💀 VOCÊ FOI ELIMINADO! Olhe para a TV.";
                    document.querySelectorAll('.btn-game').forEach(b => b.disabled = true);
                }
            }).subscribe();
        }

        function pressionar(cor) {
            palpites.push(cor);
            navigator.vibrate?.(50); // Efeito táctil leve no celular
        }

        async function enviarResposta() {
            await _supabase.from('partida').update({
                ultimo_jogador_id: meuId,
                resposta_jogador: palpites,
                verificar_resposta: true
            }).eq('id', 1);
            document.getElementById('statusPlayer').innerText = "Enviado! Aguardando resultado...";
        }
    </script>
</body>
</html>
